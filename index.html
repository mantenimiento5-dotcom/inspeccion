<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspección Inicial – Cabezal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green:  #2e7d32;
    --green2: #43a047;
    --yellow: #fdd835;
    --dark:   #1a1a1a;
    --gray:   #f4f4f4;
    --border: #ddd;
    --red:    #c62828;
    --shadow: 0 2px 12px rgba(0,0,0,.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: #f0f2f0;
    color: var(--dark);
    min-height: 100vh;
  }

  header {
    background: var(--green);
    color: #fff;
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 3px 12px rgba(0,0,0,.25);
  }
  .logo-box {
    background: var(--yellow); color: var(--green);
    font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 22px;
    padding: 4px 10px; border-radius: 4px; letter-spacing: 1px; flex-shrink: 0;
  }
  header h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: clamp(18px, 4vw, 26px); line-height: 1.1; }
  header span { font-weight: 400; font-size: 13px; opacity: .85; display: block; }

  .wrapper { max-width: 780px; margin: 22px auto; padding: 0 14px 60px; }

  .card { background: #fff; border-radius: 10px; box-shadow: var(--shadow); margin-bottom: 18px; overflow: hidden; }
  .card-header { background: var(--green); color: #fff; padding: 10px 16px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
  .card-body { padding: 16px; }

  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; }
  @media(max-width:480px){ .meta-grid { grid-template-columns: 1fr; } }

  .field label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: #555; margin-bottom: 4px; }
  .field input, .field textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 6px; padding: 9px 11px; font-family: 'Barlow', sans-serif; font-size: 14px; background: var(--gray); }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--green2); background: #fff; }

  .insp-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .insp-table th { background: #e8f5e9; color: var(--green); font-weight: 700; font-size: 11px; padding: 7px 10px; border-bottom: 2px solid var(--green2); }
  .insp-table td { padding: 7px 8px; border-bottom: 1px solid #eee; }

  .ors-group { display: flex; gap: 3px; justify-content: center; }
  .ors-group input[type=radio] { display: none; }
  .ors-btn { min-width: 35px; height: 28px; border-radius: 5px; border: 1.5px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; cursor: pointer; color: #999; background: #fff; }
  
  .ors-group input[type=radio][value="Ok"]:checked + .ors-btn { background:#43a047; border-color:#43a047; color:#fff; }
  .ors-group input[type=radio][value="R"]:checked  + .ors-btn { background:#f9a825; border-color:#f9a825; color:#fff; }
  .ors-group input[type=radio][value="S"]:checked  + .ors-btn { background:#c62828; border-color:#c62828; color:#fff; }

  .legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; padding: 6px 16px 10px; color: #666; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }

  .two-col-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
  @media(max-width:580px){ .two-col-wrapper { grid-template-columns: 1fr; } }

  .firmas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:480px){ .firmas-grid { grid-template-columns: 1fr; } }
  .firma-box canvas { border: 1.5px solid var(--border); border-radius: 6px; background: var(--gray); width: 100%; height: 90px; touch-action: none; }

  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
  .btn { display: flex; align-items: center; gap: 8px; padding: 14px 30px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; text-transform: uppercase; box-shadow: 0 3px 10px rgba(0,0,0,.18); }
  .btn-wa { background: #25d366; color: #fff; width: 100%; max-width: 400px; justify-content: center; font-size: 18px; }

  #loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 998; align-items: center; justify-content: center; flex-direction: column; gap: 14px; color: #fff; font-weight: 600; }
  .spinner { width: 46px; height: 46px; border: 5px solid rgba(255,255,255,.3); border-top-color: var(--yellow); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--green); color: #fff; padding: 12px 26px; border-radius: 30px; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; transition: transform .35s; z-index: 999; }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo-box">DTT</div>
  <div>
    <h1>Inspección Inicial</h1>
    <span>Cabezal / Truck Head</span>
  </div>
</header>

<div class="wrapper">
  <div class="card">
    <div class="card-header">📋 Datos Generales</div>
    <div class="card-body">
      <div class="meta-grid">
        <div class="field"><label>Fecha</label><input type="date" id="fecha" required></div>
        <div class="field"><label>Operador / Piloto</label><input type="text" id="operador" placeholder="Nombre completo"></div>
        <div class="field"><label>Placa</label><input type="text" id="placa" placeholder="Ej. P-123ABC"></div>
        <div class="field"><label>Teléfono</label><input type="tel" id="telefono" placeholder="+502..."></div>
        <div class="field"><label>Código Cabezal</label><input type="text" id="codigoCabezal" placeholder="Ej. CAB-001"></div>
        <div class="field"><label>Orden</label><input type="text" id="orden" placeholder="N° de orden"></div>
      </div>
    </div>
  </div>

  <div class="legend">
    <span><span class="dot" style="background:#43a047"></span> Ok</span>
    <span><span class="dot" style="background:#f9a825"></span> R (Revisión)</span>
    <span><span class="dot" style="background:#c62828"></span> S (Fuera de Servicio)</span>
  </div>

  <div class="card">
    <div class="card-header">🔧 Mecánica</div>
    <div class="card-body" style="padding:0">
      <table class="insp-table">
        <thead><tr><th>Descripción</th><th>Estado</th><th>Observaciones</th></tr></thead>
        <tbody id="tb-mecanica"></tbody>
      </table>
    </div>
  </div>

  <div class="two-col-wrapper">
    <div class="card">
      <div class="card-header">🔩 Soldadura</div>
      <div class="card-body" style="padding:0">
        <table class="insp-table">
          <thead><tr><th>Descripción</th><th>Estado</th></tr></thead>
          <tbody id="tb-soldadura"></tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-header">⚡ Electromecánica</div>
      <div class="card-body" style="padding:0">
        <table class="insp-table">
          <thead><tr><th>Descripción</th><th>Estado</th></tr></thead>
          <tbody id="tb-electro"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">📝 Observaciones y Firmas</div>
    <div class="card-body">
      <div class="field" style="margin-bottom:12px">
        <label>Observaciones</label>
        <textarea id="obsOperador" placeholder="Novedades detectadas..."></textarea>
      </div>
      <div class="firmas-grid">
        <div class="firma-box">
          <label>Nombre Operador</label>
          <input type="text" id="nombreOperador" placeholder="Nombre">
          <canvas id="firmaOperador"></canvas>
        </div>
        <div class="firma-box">
          <label>Nombre Auditor</label>
          <input type="text" id="nombreAuditor" placeholder="Nombre">
          <canvas id="firmaAuditor"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-wa" onclick="procesarYEnviarWhatsApp()">
      🚀 ENVIAR REPORTE POR WHATSAPP
    </button>
  </div>
</div>

<div id="loading"><div class="spinner"></div><p id="loading-txt">Procesando inspección...</p></div>
<div id="toast"></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzZweV0oVZeMh-MCYvmWAJHnGCc-6uzZ5eiFXGjj1EGRDIxS2y6eojeKBlRs-_IdQ-Nxg/exec";

const SECCIONES = {
  mecanica: ["Lubricación","Sist. De Enfriamiento","Sist. De Frenos","Sist. De Inyección","Sist. Dirección","Sist. Suspensión","Transmisión de potencia"],
  soldadura: ["S Turbo","Chasis/Puente","Escape","Flexible","Silenciadores/base/tensor","Sinchos","Tanques de combustible","Tornamesa"],
  electro: ["Alternador","Baterías","Cables","Chicote Eléctrico","Computadora","Fajas","Fusibles","Luces delanteras","Luces laterales","Luces pidevías","Luz Placa","Motor limpia brisas","Sportline","Starter","Stop"]
};

function buildTables() {
  Object.keys(SECCIONES).forEach(sec => {
    const tbody = document.getElementById("tb-" + sec);
    if (!tbody) return;
    tbody.innerHTML = "";
    
    SECCIONES[sec].forEach(item => {
      const id = sec + "_" + item.replace(/[^a-zA-Z0-9]/g, "_");
      let tr = `<tr>
        <td>${item}</td>
        <td>
          <div class="ors-group">
            <input type="radio" name="${id}" id="${id}_ok" value="Ok" checked>
            <label for="${id}_ok" class="ors-btn">Ok</label>
            <input type="radio" name="${id}" id="${id}_r" value="R">
            <label for="${id}_r" class="ors-btn">R</label>
            <input type="radio" name="${id}" id="${id}_s" value="S">
            <label for="${id}_s" class="ors-btn">S</label>
          </div>
        </td>`;
      if (sec === 'mecanica') {
        tr += `<td><input type="text" id="${id}_obs" style="width:100%; padding:4px; border:1px solid #ccc; border-radius:4px;"></td>`;
      }
      tr += `</tr>`;
      tbody.innerHTML += tr;
    });
  });
}

function getData() {
  const data = {
    fecha: document.getElementById('fecha').value,
    operador: document.getElementById('operador').value,
    placa: document.getElementById('placa').value,
    telefono: document.getElementById('telefono').value,
    codigoCabezal: document.getElementById('codigoCabezal').value,
    orden: document.getElementById('orden').value,
    obsOperador: document.getElementById('obsOperador').value,
    nombreOperador: document.getElementById('nombreOperador').value,
    nombreAuditor: document.getElementById('nombreAuditor').value,
    items: {}
  };

  Object.keys(SECCIONES).forEach(sec => {
    data.items[sec] = {};
    SECCIONES[sec].forEach(item => {
      const id = sec + "_" + item.replace(/[^a-zA-Z0-9]/g, "_");
      const checked = document.querySelector(`input[name="${id}"]:checked`);
      const obsEl = document.getElementById(id + "_obs");
      data.items[sec][item] = {
        estado: checked ? checked.value : 'Ok',
        obs: obsEl ? obsEl.value : ''
      };
    });
  });
  return data;
}

function initCanvas(id) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let drawing = false;
  canvas.width = canvas.offsetWidth; 
  canvas.height = 90;

  function pos(e) { 
    const r = canvas.getBoundingClientRect(); 
    const s = e.touches ? e.touches[0] : e; 
    return { x: s.clientX - r.left, y: s.clientY - r.top }; 
  }
  canvas.addEventListener('pointerdown', e => { drawing = true; ctx.beginPath(); const p = pos(e); ctx.moveTo(p.x, p.y); });
  canvas.addEventListener('pointermove', e => { if (!drawing) return; const p = pos(e); ctx.lineTo(p.x, p.y); ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke(); });
  canvas.addEventListener('pointerup', () => drawing = false);
}

async function procesarYEnviarWhatsApp() {
  const d = getData();
  if (!d.fecha || !d.placa) {
    showToast("⚠️ Coloca la Fecha y Placa obligatoriamente");
    return;
  }

  const loading = document.getElementById('loading');
  const loadingTxt = document.getElementById('loading-txt');
  loading.style.display = 'flex';
  loadingTxt.textContent = "Guardando en Google Sheets y creando PDF...";

  try {
    const response = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(d)
    });
    
    const result = await response.json();
    loading.style.display = 'none';

    if (result.status === 'ok' && result.pdfUrl) {
      let txt = "🚛 *REPORTE DE INSPECCIÓN INICIAL*\n";
      txt += "━━━━━━━━━━━━━━━━━━━━\n";
      txt += `📅 *Fecha:* ${d.fecha}\n`;
      txt += `🚘 *Placa:* ${d.placa}\n`;
      txt += `👤 *Operador:* ${d.operador || '—'}\n`;
      txt += `🔑 *Código:* ${d.codigoCabezal || '—'}\n\n`;
      txt += `📄 *Ver Reporte Completo en PDF:* \n${result.pdfUrl}\n`;
      txt += "━━━━━━━━━━━━━━━━━━━━";

      const urlWa = `https://wa.me/?text=${encodeURIComponent(txt)}`;
      window.open(urlWa, '_blank');
      showToast("✅ ¡Enviado con éxito!");
    } else {
      showToast("❌ Error al generar el enlace del PDF");
    }
  } catch (err) {
    loading.style.display = 'none';
    showToast("❌ Hubo un problema al conectar con el servidor");
    console.error(err);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast'); 
  t.textContent = msg; 
  t.className = 'show';
  setTimeout(() => { t.className = ''; }, 3500);
}

document.addEventListener('DOMContentLoaded', () => {
  buildTables(); 
  initCanvas('firmaOperador'); 
  initCanvas('firmaAuditor');
  document.getElementById('fecha').valueAsDate = new Date();
});
</script>
</body>
</html>
